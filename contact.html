<body>

        <ul class="list-nav header-list">

        </ul>
    </header>

    <div class="top-background">
    </div>

    <div class="top-container">
        <img class="top-logo" src="img/contact.png">
       
    </div>

    <section class="contact">
        
        <p class="contact_sentence">
            お仕事のご連絡などございましたら、下記よりお問い合わせください。
        </p>
        <form id="form" class="contact_form" action="" method="post">

                <label for="contact_name">
                    <p class="contact_form_title">お名前</p>
                </label>
                <input id="contact_name" class="contact_form_input contact_form_input--name" name="name" type="text" required>
            <div class="error_message">お名前が未入力です</div>


                <label for="contact_mail">
                    <p class="contact_form_title">メールアドレス</p>
                </label>
                <input id="contact_mail" class="contact_form_input contact_form_input--mail" name="mail" type="email" required>
        
            <div class="error_message--mail">メールアドレスが正しくありません</div>


                <label>
                    <p class="contact_form_title">お問い合わせ内容</p>
                </label>
                <textarea id="contact_message" class="contact_form_input contact_form_input--message" wrap="soft" name="message" required></textarea>
            <div class="error_message">お問い合わせ内容が未入力です</div>

            <button class="contact_form_button" type="submit" name="action" value="post" disabled="disabled">送信する</button>
        </form>
    </section>

    <footer class="footer">
        <p>SUGIMOTO YOTA</p>
    </footer>
</body>
